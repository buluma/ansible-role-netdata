---
- name: Prepare
  hosts: all
  gather_facts: false
  become: true
  serial: 30%

  pre_tasks:
    - name: Find EXTERNALLY-MANAGED files
      ansible.builtin.find:
        paths: /usr/lib
        patterns: "EXTERNALLY-MANAGED"
        recurse: true
      register: externally_managed_files

    - name: Remove EXTERNALLY-MANAGED files
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ externally_managed_files.files }}"

  roles:
    - role: buluma.bootstrap
    - role: buluma.git

  tasks:
    - name: Update Apt Cache and install cron
      ansible.builtin.apt:
        name: cron
        update_cache: true
      become: true
      when: ansible_facts['os_family'] == "Debian"

    - name: Install cron as requisite
      ansible.builtin.package:
        name: cronie
        state: present
      become: true
      when: ansible_facts['os_family'] == "RedHat"
